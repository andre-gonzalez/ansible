---
- name: Web Browser | Install helium
  tags:
    - aur
  kewlfft.aur.aur:
    name:
      - helium-browser-bin
    use: yay
    state: present
    update_cache: true
  when: ansible_facts["distribution"] == "Archlinux"
  ignore_errors: true

- name: Web Browser | Copy ufw web browsing rule file
  tags:
    - web_browser
  ansible.builtin.copy:
    src: webrowser-ufw
    dest: /etc/ufw/applications.d/ufw-webrowser
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Web Browser | Allow web browsing in ufw
  tags:
    - web_browser
  community.general.ufw:
    rule: allow
    name: webrowser
    direction: out
    state: enabled
  become: true

- name: Web Browser | Install widevine and ffmpeg
  tags:
    - web_browser
  kewlfft.aur.aur:
    name:
      - chromium-widevine
      - chromium-ffmpeg
    use: yay
    state: present
    update_cache: true
  when: ansible_facts["distribution"] == "Archlinux"
  ignore_errors: true
