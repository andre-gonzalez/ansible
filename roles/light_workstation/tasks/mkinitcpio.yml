---
# This play add the GPU driver to mkinitcpio so I can unlock LUKS with
# the external monitor
- name: Mkinitcpio | Get GPU info
  tags:
    - mkinitcpio
  ansible.builtin.command: lspci -nnk
  register: light_workstation_gpu_info
  changed_when: false

- name: Mkinitcpio | Set GPU driver modules fact
  tags:
    - mkinitcpio
  ansible.builtin.set_fact:
    light_workstation_gpu_modules: >-
      {{
        (
          (['i915'] if 'Intel' in light_workstation_gpu_info.stdout else []) +
          (['amdgpu'] if 'AMD' in light_workstation_gpu_info.stdout else []) +
          (['nouveau'] if 'NVIDIA' in light_workstation_gpu_info.stdout else [])
        )
      }}

- name: Mkinitcpio | Read mkinitcpio.conf
  tags:
    - mkinitcpio
  ansible.builtin.slurp:
    src: /etc/mkinitcpio.conf
  register: light_workstation_mkinitcpio_conf_raw

- name: Mkinitcpio | Parse MODULES line
  tags:
    - mkinitcpio
  ansible.builtin.set_fact:
    light_workstation_current_modules: >-
      {{
        light_workstation_mkinitcpio_conf_raw['content'] | b64decode |
        regex_search('^MODULES=\\((.*?)\\)', '\\1', multiline=True) |
        first | default('') | split()
      }}

- name: Mkinitcpio | Merge GPU modules into current modules (deduplicated)
  tags:
    - mkinitcpio
  ansible.builtin.set_fact:
    light_workstation_merged_modules: "{{ (light_workstation_current_modules + light_workstation_gpu_modules) | unique }}"

- name: Mkinitcpio | Update mkinitcpio.conf with merged modules
  tags:
    - mkinitcpio
  ansible.builtin.lineinfile:
    path: /etc/mkinitcpio.conf
    regexp: '^MODULES='
    line: "MODULES=({{ light_workstation_merged_modules | join(' ') }})"
    backrefs: true
  register: light_workstation_mkinitcpio_updated
  become: true

- name: Mkinitcpio | Rebuild initramfs
  tags:
    - mkinitcpio
  ansible.builtin.command: mkinitcpio -P
  when: light_workstation_mkinitcpio_updated is changed
  become: true
