---
- name: Set zathura as default pdf reader
  ansible.builtin.command: xdg-mime default org.pwmt.zathura.desktop application/pdf
  register: light_workstation_zathura_xdg_mine
  changed_when: light_workstation_zathura_xdg_mine.rc != 2

- name: Set up dotfiles
  tags:
    - dotfiles
  ansible.builtin.command: /usr/bin/git --git-dir={{ lookup('env', 'HOME') }}/.config/dotfiles/ --work-tree={{ lookup('env', 'HOME') }} checkout -f
  listen: set_up_dotfiles
  register: light_workstation_dotfiles_set
  changed_when: light_workstation_dotfiles_set.rc != 2

- name: Install wall-d
  tags:
    - wall-d
  ansible.builtin.command: ./install.sh
  args:
    chdir: "{{ lookup('env', 'HOME') }}/.config/wall-d/"
  listen: install_wall-d
  register: light_workstation_wall_d_installed
  changed_when: light_workstation_wall_d_installed.rc != 2

- name: Start iwd
  tags:
    - wifi
  ansible.builtin.service:
    name: iwd
    state: restarted
    enabled: true
  become: true
  listen: restart_network is changed

- name: Restart systemd-networkd
  tags:
    - network
  ansible.builtin.service:
    name: systemd-networkd
    state: restarted
    enabled: true
  become: true
  when: restart_network is changed

- name: Reload systemd daemon
  tags:
    - systemd
    - autologin
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
