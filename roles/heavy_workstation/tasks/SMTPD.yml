---
- name: SMTPD | Install opensmtpd
  tags:
    - opensmtpd
  ansible.builtin.package:
    name: opensmtpd
  become: true
  when: ansible_facts["distribution"] == "Archlinux"

- name: SMTPD | Restart opensmtpd
  tags:
    - opensmtpd
  ansible.builtin.service:
    name: smtpd
    state: restarted
    enabled: true
  become: true
