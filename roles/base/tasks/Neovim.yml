---
- name: Neovim | Install neovim
  tags:
    - neovim
  ansible.builtin.package:
    name:
      - neovim
      - tree-sitter-cli
    state: present
    update_cache: false
  become: true

- name: Neovim | Set neovim as default git editor
  tags:
    - neovim
    - git
  community.general.git_config:
    name: core.editor
    scope: global
    value: nvim
